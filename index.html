<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>German-Czech Flashcards</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8ea;
      --paper-deep: #f3dcc0;
      --ink: #2f3a42;
      --muted: #6f746d;
      --line: rgba(87, 72, 48, 0.18);
      --green: #2f7667;
      --amber: #bb7a26;
      --red: #b75142;
      --blue: #4479a8;
      --bamboo-main: #c99348;
      --bamboo-light: #e0b168;
      --bamboo-dark: #9d6b2d;
      --shadow: 0 22px 48px rgba(91, 72, 43, 0.22);
      --steamer-width: 468px;
      --steamer-height: 276px;
      --footer-height: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--ink);
      font-family: Arial, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 249, 228, 0.96), rgba(255, 255, 255, 0) 34%),
        linear-gradient(160deg, #f8fbff 0%, #edf7f2 48%, #fff6e7 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      padding: 18px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 14px;
    }

    .background-art {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .village-art {
      position: absolute;
      left: 50%;
      bottom: 120px;
      width: min(980px, 112vw);
      height: auto;
      transform: translateX(-50%);
      opacity: 0.38;
    }

    .bamboo-art {
      position: absolute;
      bottom: 58px;
      width: 180px;
      height: auto;
      opacity: 0.48;
    }

    .bamboo-art.left {
      left: 8px;
    }

    .bamboo-art.right {
      right: -18px;
      transform: scaleX(-1);
    }

    .lantern {
      position: absolute;
      top: 70px;
      width: 54px;
      height: 78px;
      opacity: 0.55;
      animation: lanternFloat 3.6s ease-in-out infinite;
    }

    .lantern.left {
      left: 10%;
    }

    .lantern.right {
      right: 12%;
      top: 106px;
      width: 46px;
      height: 68px;
      animation-delay: 0.7s;
    }

    .kite {
      position: absolute;
      width: 84px;
      height: auto;
      opacity: 0.58;
      transform-origin: 50% 80%;
    }

    .kite.one {
      left: 22%;
      top: 42px;
      animation: kiteFloatOne 7.5s ease-in-out infinite;
    }

    .kite.two {
      right: 20%;
      top: 34px;
      width: 68px;
      opacity: 0.52;
      animation: kiteFloatTwo 8.7s ease-in-out infinite;
    }

    .koi {
      position: absolute;
      left: 0;
      top: 0;
      width: 132px;
      height: auto;
      opacity: 0.62;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .koi-bubble {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 55;
      width: min(430px, calc(100vw - 32px));
      min-height: 96px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(114, 164, 183, 0.16);
      border-radius: 999px;
      padding: 20px 30px;
      color: rgba(47, 58, 66, 0.8);
      background: rgba(247, 253, 255, 0.58);
      box-shadow:
        inset 0 8px 24px rgba(255, 255, 255, 0.72),
        0 12px 30px rgba(96, 132, 145, 0.08);
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.25;
      text-align: center;
      overflow-wrap: anywhere;
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(0.96);
      transition: opacity 900ms ease, color 900ms ease, background 900ms ease, transform 900ms ease;
      pointer-events: none;
    }

    .koi-bubble::before,
    .koi-bubble::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(114, 164, 183, 0.14);
      border-radius: 50%;
      background: rgba(247, 253, 255, 0.42);
      box-shadow: inset 0 4px 12px rgba(255, 255, 255, 0.72);
    }

    .koi-bubble::before {
      left: 26px;
      bottom: -16px;
      width: 24px;
      height: 24px;
    }

    .koi-bubble::after {
      left: 58px;
      bottom: -34px;
      width: 13px;
      height: 13px;
    }

    .koi-bubble.visible {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }

    .koi-bubble.fading {
      color: rgba(47, 58, 66, 0);
      background: rgba(247, 253, 255, 0.08);
      opacity: 0;
    }

    @keyframes lanternFloat {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(8px) rotate(1.5deg);
      }
    }

    @keyframes kiteFloatOne {
      0%, 100% {
        transform: translate(0, 0) rotate(-8deg);
      }
      24% {
        transform: translate(34px, 16px) rotate(5deg);
      }
      53% {
        transform: translate(-18px, 40px) rotate(-14deg);
      }
      78% {
        transform: translate(42px, -8px) rotate(9deg);
      }
    }

    @keyframes kiteFloatTwo {
      0%, 100% {
        transform: translate(0, 0) rotate(9deg);
      }
      22% {
        transform: translate(-30px, 22px) rotate(-7deg);
      }
      57% {
        transform: translate(26px, 45px) rotate(15deg);
      }
      82% {
        transform: translate(-46px, -4px) rotate(-11deg);
      }
    }

    .infobar {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 65;
      width: min(calc(100vw - 36px), 860px);
      margin: 0;
      border: 1px solid rgba(80, 67, 48, 0.16);
      border-radius: 8px;
      background: rgba(255, 252, 244, 0.86);
      box-shadow: 0 10px 26px rgba(82, 67, 42, 0.1);
      backdrop-filter: blur(10px);
      opacity: 0.96;
      transform: translate(-50%, calc(100% + 18px));
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .scene.settings-open .infobar,
    .infobar:hover,
    .infobar:focus-within {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .settings {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      min-width: 0;
      min-height: 32px;
      padding: 5px 8px;
      border: 1px solid rgba(80, 67, 48, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .settings input {
      width: 72px;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 7px;
      text-align: right;
      color: var(--ink);
      background: #ffffff;
    }

    .stage {
      position: relative;
      z-index: 20;
      width: min(100%, 760px);
      margin: 0 auto;
      display: grid;
      place-items: center;
      min-height: clamp(620px, calc(100vh - var(--footer-height) - 46px), 780px);
    }

    .card-stage {
      position: relative;
      width: min(100%, 620px);
      min-height: clamp(600px, calc(100vh - var(--footer-height) - 70px), 740px);
      display: grid;
      justify-items: center;
      align-items: start;
      padding: 20px;
    }

    .unknown-toggle {
      position: fixed;
      right: 16px;
      top: 50%;
      z-index: 60;
      min-height: 42px;
      border: 1px solid rgba(183, 81, 66, 0.28);
      border-radius: 8px 8px 0 0;
      padding: 9px 12px;
      color: #ffffff;
      background: var(--red);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(96, 62, 42, 0.2);
      transform: translateY(-50%) rotate(-90deg) translateY(-46px);
      transform-origin: right center;
    }

    .settings-toggle {
      position: fixed;
      right: 16px;
      top: calc(50% + 112px);
      z-index: 60;
      min-height: 42px;
      border: 1px solid rgba(47, 118, 103, 0.28);
      border-radius: 8px 8px 0 0;
      padding: 9px 12px;
      color: #ffffff;
      background: var(--green);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(96, 62, 42, 0.18);
      transform: translateY(-50%) rotate(-90deg) translateY(-46px);
      transform-origin: right center;
    }

    .unknown-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 70;
      width: min(380px, calc(100vw - 42px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-left: 1px solid rgba(80, 67, 48, 0.18);
      background: rgba(255, 252, 244, 0.97);
      box-shadow: -22px 0 42px rgba(91, 72, 43, 0.18);
      transform: translateX(100%);
      transition: transform 220ms ease;
    }

    .unknown-panel.open {
      transform: translateX(0);
    }

    .unknown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(80, 67, 48, 0.14);
    }

    .unknown-header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 1.02rem;
      line-height: 1.15;
    }

    .unknown-count {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .close-panel {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(80, 67, 48, 0.16);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.7);
      font-weight: 900;
      line-height: 1;
    }

    .unknown-list {
      min-height: 0;
      margin: 0;
      padding: 10px 12px 18px;
      overflow-y: auto;
      list-style: none;
    }

    .unknown-item {
      padding: 11px 8px;
      border-bottom: 1px solid rgba(80, 67, 48, 0.12);
    }

    .unknown-german {
      color: #5f4632;
      font-size: 0.95rem;
      font-weight: 900;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .unknown-czech {
      margin-top: 4px;
      color: var(--green);
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .unknown-empty {
      padding: 18px 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .steamer-wrap {
      position: absolute;
      left: 50%;
      bottom: -66px;
      width: min(var(--steamer-width), calc(100vw - 36px));
      height: var(--steamer-height);
      transform: translateX(-50%);
      z-index: 30;
      pointer-events: none;
    }

    .steamer-lid {
      position: absolute;
      left: -6px;
      right: -6px;
      top: 56px;
      height: 66px;
      z-index: 30;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(ellipse at 50% 8%, #f7d99b 0 16%, transparent 17%),
        repeating-linear-gradient(90deg, rgba(92, 55, 20, 0.18) 0 8px, rgba(255, 235, 177, 0.22) 8px 18px),
        linear-gradient(#edc77c 0%, #d39746 68%, #a96a28 100%);
      border: 6px solid #7f4f22;
      box-shadow:
        inset 0 12px 10px rgba(255, 241, 193, 0.42),
        inset 0 -10px 12px rgba(103, 64, 24, 0.22),
        0 13px 16px rgba(92, 59, 25, 0.2);
      transform-origin: 17% 78%;
      transition: transform 360ms cubic-bezier(.2,.86,.2,1), top 360ms cubic-bezier(.2,.86,.2,1);
    }

    .steamer-lid::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -20px;
      width: 72px;
      height: 36px;
      transform: translateX(-50%);
      border-radius: 50% 50% 42% 42%;
      background: linear-gradient(#edc782, #b8772d);
      border: 5px solid var(--bamboo-dark);
      box-shadow: inset 0 8px 7px rgba(255, 240, 189, 0.38);
    }

    .steamer-lid::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;
      height: 16px;
      border-radius: 50%;
      background: rgba(90, 55, 19, 0.18);
    }

    .scene.lid-open .steamer-lid {
      top: 0;
      transform: translateX(-50px) rotate(-24deg);
    }

    .steamer-back {
      position: absolute;
      left: 9px;
      right: 9px;
      top: 108px;
      height: 54px;
      z-index: 9;
      border-radius: 50%;
      background:
        repeating-linear-gradient(90deg, rgba(126, 83, 32, 0.15) 0 10px, rgba(255, 236, 177, 0.14) 10px 22px),
        linear-gradient(#e5b96d, #c98f40);
      border: 5px solid var(--bamboo-dark);
      box-shadow: inset 0 9px 8px rgba(255, 238, 184, 0.35);
    }

    .steamer-body,
    .steamer-tier {
      position: absolute;
      left: 0;
      right: 0;
      height: 118px;
      z-index: 2;
      border-radius: 0 0 46px 46px / 0 0 24px 24px;
      background:
        repeating-linear-gradient(90deg, rgba(91, 55, 21, 0.24) 0 8px, rgba(255, 232, 166, 0.18) 8px 17px),
        repeating-linear-gradient(0deg, rgba(100, 61, 22, 0.18) 0 5px, rgba(255, 229, 157, 0.22) 5px 13px),
        linear-gradient(90deg, #e7b760, #c98c37 50%, #dea252);
      border: 6px solid #7f4f22;
      box-shadow:
        inset 18px 0 14px rgba(255, 230, 174, 0.22),
        inset -16px 0 14px rgba(104, 66, 27, 0.13),
        0 22px 28px rgba(112, 79, 40, 0.18);
    }

    .steamer-body {
      bottom: 42px;
      z-index: 3;
    }

    .steamer-tier.middle {
      bottom: 36px;
      left: 10px;
      right: 10px;
      z-index: 2;
      filter: brightness(0.96);
    }

    .steamer-tier.bottom {
      bottom: 4px;
      left: 20px;
      right: 20px;
      z-index: 1;
      filter: brightness(0.9);
    }

    .steamer-rim,
    .steamer-tier::before,
    .steamer-tier::after {
      position: absolute;
      border-radius: 50%;
      background:
        repeating-linear-gradient(90deg, rgba(97, 57, 19, 0.16) 0 11px, rgba(255, 235, 174, 0.22) 11px 23px),
        linear-gradient(#eac06d, #b9792e);
      border: 6px solid #7f4f22;
      box-shadow:
        inset 0 9px 7px rgba(255, 237, 186, 0.42),
        inset 0 -8px 9px rgba(105, 65, 22, 0.18);
    }

    .steamer-rim {
      left: -6px;
      right: -6px;
      top: 86px;
      height: 54px;
      z-index: 10;
    }

    .steamer-tier::before {
      content: "";
      left: -6px;
      right: -6px;
      top: -28px;
      height: 52px;
      z-index: 3;
    }

    .steamer-tier::after {
      content: "";
      left: 24px;
      right: 24px;
      top: -12px;
      height: 18px;
      z-index: 9;
      border: 0;
      background: rgba(91, 55, 21, 0.18);
      box-shadow: inset 0 7px 8px rgba(69, 42, 17, 0.14);
    }

    .steamer-lip {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 104px;
      height: 22px;
      z-index: 9;
      border-radius: 50%;
      background: rgba(119, 76, 27, 0.28);
      box-shadow: inset 0 7px 8px rgba(69, 42, 17, 0.16);
    }

    .steam {
      position: absolute;
      left: 50%;
      bottom: 104px;
      z-index: 4;
      width: 170px;
      height: 120px;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0.55;
    }

    .steam span {
      position: absolute;
      bottom: 0;
      width: 18px;
      height: 78px;
      border-left: 4px solid rgba(255, 255, 255, 0.86);
      border-radius: 50%;
      animation: steamRise 2.8s ease-in-out infinite;
    }

    .steam span:nth-child(1) { left: 34px; animation-delay: 0s; }
    .steam span:nth-child(2) { left: 78px; height: 98px; animation-delay: 0.45s; }
    .steam span:nth-child(3) { left: 118px; animation-delay: 0.9s; }

    @keyframes steamRise {
      0%, 100% {
        transform: translateY(14px) scale(0.92);
        opacity: 0;
      }
      42% {
        opacity: 0.75;
      }
      72% {
        transform: translateY(-20px) scale(1.06);
        opacity: 0.12;
      }
    }

    .flashcard {
      position: relative;
      z-index: 2;
      width: min(100%, 460px);
      min-height: 380px;
      display: grid;
      place-items: center;
      text-align: center;
      transform: translate3d(0, 0, 0);
      opacity: 1;
    }

    .flashcard.enter {
      animation: fadeIn 180ms ease-out;
    }

    .flashcard.prepare-pop {
      opacity: 0;
      transform: translate3d(0, 245px, 0) scale(0.54);
      transform-origin: 50% 82%;
    }

    .flashcard.pop-from-steamer {
      animation: popFromSteamer 720ms cubic-bezier(.18,.92,.22,1.08) forwards;
      transform-origin: 50% 82%;
    }

    .flashcard.exit-left {
      animation: exitLeft 420ms cubic-bezier(.32,.02,.64,.98) forwards;
    }

    .flashcard.exit-up {
      animation: exitUp 420ms cubic-bezier(.32,.02,.64,.98) forwards;
    }

    .flashcard.exit-right {
      animation: exitRight 420ms cubic-bezier(.32,.02,.64,.98) forwards;
    }

    .bun {
      position: absolute;
      top: 6px;
      left: 50%;
      width: min(100%, 390px);
      min-height: 245px;
      transform: translateX(-50%);
      padding: 60px 48px 62px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 22px 28px rgba(91, 72, 43, 0.22));
    }

    .bun-art,
    .dumpling-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .bun-art {
      z-index: 0;
    }

    .dumpling {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(86%, 340px);
      min-height: 128px;
      transform: translateX(-50%) translateY(8px) scale(0.96);
      padding: 34px 42px 24px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 16px 18px rgba(91, 72, 43, 0.18));
      opacity: 1;
      transition: none;
      z-index: 3;
    }

    .dumpling-art {
      z-index: 0;
    }

    .dumpling.hidden {
      opacity: 0;
      visibility: hidden;
      transform: translateX(-50%) translateY(34px) scale(0.86);
    }

    .dumpling.prepare-pop {
      opacity: 0;
      visibility: visible;
      transform: translateX(-50%) translateY(238px) scale(0.54);
    }

    .dumpling.pop-from-steamer {
      visibility: visible;
      animation: dumplingPopFromSteamer 620ms cubic-bezier(.18,.92,.22,1.08) forwards;
    }

    .dumpling.return-to-steamer {
      visibility: visible;
      animation: dumplingReturnToSteamer 520ms cubic-bezier(.32,.02,.64,.98) forwards;
    }

    .german {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      max-height: 120px;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.1;
      color: #5f4632;
      overflow-wrap: anywhere;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .answer {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      max-height: 62px;
      color: var(--green);
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.14;
      overflow-wrap: anywhere;
    }

    .answer.hidden {
      color: transparent;
    }

    .action-button {
      min-height: 32px;
      border: 1px solid rgba(80, 67, 48, 0.16);
      border-radius: 8px;
      padding: 6px 9px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.15;
      transition: transform 160ms ease, background 160ms ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      background: #ffffff;
    }

    .action-button:active {
      transform: translateY(1px);
    }

    .known {
      color: var(--green);
    }

    .unsure {
      color: var(--amber);
    }

    .unknown {
      color: var(--red);
    }

    .audio {
      color: var(--blue);
    }

    .button-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }

    .infobar {
      padding: 10px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
    }

    .info-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border: 1px solid rgba(80, 67, 48, 0.14);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.58);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.15;
    }

    .pill strong {
      color: var(--ink);
    }

    .legend {
      justify-content: flex-end;
    }

    .legend .pill {
      font-weight: 700;
    }

    .toggle-answer {
      min-height: 32px;
      border: 1px solid rgba(47, 118, 103, 0.26);
      border-radius: 8px;
      padding: 6px 10px;
      color: #ffffff;
      background: var(--green);
      font-weight: 800;
      line-height: 1.15;
    }

    .complete {
      position: relative;
      z-index: 2;
      display: none;
      width: min(100%, 430px);
      border: 1px solid rgba(94, 70, 43, 0.16);
      border-radius: 8px;
      padding: 28px 18px;
      text-align: center;
      background: rgba(255, 252, 244, 0.92);
      box-shadow: var(--shadow);
    }

    .complete h2 {
      margin: 0 0 10px;
      font-size: 1.45rem;
    }

    .complete p {
      margin: 7px 0;
      color: var(--muted);
      font-weight: 700;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate3d(0, 22px, 0) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes popFromSteamer {
      0% {
        opacity: 0;
        transform: translate3d(0, 245px, 0) scale(0.54);
      }
      62% {
        opacity: 1;
        transform: translate3d(0, -18px, 0) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes dumplingPopFromSteamer {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(238px) scale(0.54);
      }
      66% {
        opacity: 1;
        transform: translateX(-50%) translateY(-10px) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(8px) scale(0.96);
      }
    }

    @keyframes dumplingReturnToSteamer {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(8px) scale(0.96);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(238px) scale(0.54);
      }
    }

    @keyframes exitLeft {
      to {
        opacity: 0;
        transform: translate3d(-88%, 30px, 0) rotate(-10deg) scale(0.48);
      }
    }

    @keyframes exitUp {
      to {
        opacity: 0;
        transform: translate3d(0, -70%, 0) scale(0.48);
      }
    }

    @keyframes exitRight {
      to {
        opacity: 0;
        transform: translate3d(88%, 30px, 0) rotate(10deg) scale(0.48);
      }
    }

    @media (max-width: 620px) {
      .scene {
        padding: 12px;
        gap: 10px;
      }

      .infobar {
        width: 100%;
      }

      .settings {
        justify-content: space-between;
      }


      .stage {
        min-height: clamp(590px, calc(100vh - 190px), 650px);
      }

      .card-stage {
        min-height: clamp(570px, calc(100vh - 210px), 630px);
        padding: 18px 2px 36px;
      }

      .flashcard {
        width: min(100%, 370px);
        min-height: 356px;
      }

      .bun {
        width: min(100% - 54px, 320px);
        min-height: 220px;
        padding: 52px 34px 56px;
      }

      .dumpling {
        width: min(82%, 282px);
        min-height: 118px;
        padding: 30px 30px 22px;
      }

      .steamer-wrap {
        bottom: -52px;
        width: min(351px, calc(100vw - 24px));
        height: 236px;
      }

      .infobar {
        grid-template-columns: 1fr;
      }

      .legend {

    const elements = {
      scene: document.querySelector(".scene"),
      loadStatus: document.getElementById("loadStatus"),
      sessionProgress: document.getElementById("sessionProgress"),
      dailyProgress: document.getElementById("dailyProgress"),
      cardStage: document.getElementById("cardStage"),
      flashcard: document.getElementById("flashcard"),
      germanText: document.getElementById("germanText"),

      answerText: document.getElementById("answerText"),
      toggleAnswer: document.getElementById("toggleAnswer"),
      knownButton: document.getElementById("knownButton"),
      unsureButton: document.getElementById("unsureButton"),
      unknownButton: document.getElementById("unknownButton"),
      audioButton: document.getElementById("audioButton"),
      dailyTargetInput: document.getElementById("dailyTargetInput"),
      targetNote: document.getElementById("targetNote"),
      completeView: document.getElementById("completeView"),
      completeReviewed: document.getElementById("completeReviewed"),
      completeBreakdown: document.getElementById("completeBreakdown"),
      koi: document.querySelector(".koi"),
      koiBubble: document.getElementById("koiBubble"),
      settingsPanelToggle: document.getElementById("settingsPanelToggle"),
      unknownPanelToggle: document.getElementById("unknownPanelToggle"),
      unknownPanelClose: document.getElementById("unknownPanelClose"),
      unknownPanel: document.getElementById("unknownPanel"),
      unknownCount: document.getElementById("unknownCount"),
      unknownList: document.getElementById("unknownList")
    };

    let cards = [];
    let cardStates = {};
    let todayStats = defaultStats();
    let queue = [];
    let currentCard = null;
    let answerVisible = false;
    let animating = false;
    let dailyTarget = DEFAULT_DAILY_TARGET;
    let lidTimer = null;
    let lidCloseTimer = null;
    let popTimer = null;
    let finishPopTimer = null;
    let dumplingPopTimer = null;
    let finishDumplingPopTimer = null;
    let dumplingAnimating = false;
    let koiMotion = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      speed: KOI_MIN_SPEED,
      facing: 1,
      paused: false,
      lastFrame: null,
      animationFrame: null,
      bubbleTimer: null,
      fadeTimer: null,
      hideTimer: null
    };

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function dateOnly(date) {
      return date.toISOString().slice(0, 10);
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function defaultStats() {
      return {
        reviewed: 0,
        known: 0,
        unsure: 0,
        unknown: 0,
        newIntroduced: 0
      };
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        console.warn(`Could not load ${key}`, error);
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function loadDailyTarget() {
      const raw = localStorage.getItem(STORAGE_KEYS.target);
      if (raw === null) return DEFAULT_DAILY_TARGET;
      const saved = Number(raw);
      return Number.isFinite(saved) ? Math.max(MIN_DAILY_TARGET, Math.floor(saved)) : DEFAULT_DAILY_TARGET;
    }

    function saveDailyTarget(value) {
      dailyTarget = Math.max(MIN_DAILY_TARGET, Math.floor(Number(value) || DEFAULT_DAILY_TARGET));
      localStorage.setItem(STORAGE_KEYS.target, String(dailyTarget));
      elements.dailyTargetInput.value = dailyTarget;
      elements.targetNote.textContent = `Current target: ${dailyTarget}`;
      updateProgress();
    }

    function loadStatsForToday() {
      const savedDate = localStorage.getItem(STORAGE_KEYS.statsDate);
      if (savedDate !== todayKey()) {
        localStorage.setItem(STORAGE_KEYS.statsDate, todayKey());
        saveJson(STORAGE_KEYS.stats, defaultStats());
        return defaultStats();
      }
      return { ...defaultStats(), ...loadJson(STORAGE_KEYS.stats, defaultStats()) };
    }

    function saveState() {
      saveJson(STORAGE_KEYS.states, cardStates);
      saveJson(STORAGE_KEYS.stats, todayStats);
    }

    function pulseSteamerLid() {
      clearTimeout(lidTimer);
      clearTimeout(lidCloseTimer);
      lidTimer = window.setTimeout(() => {
        elements.scene.classList.add("lid-open");
        lidCloseTimer = window.setTimeout(() => {
          elements.scene.classList.remove("lid-open");
        }, LID_CLOSE_AFTER_POP_DELAY);
      }, LID_OPEN_DELAY);
    }

    function clearSteamerTimers() {
      clearTimeout(lidTimer);
      clearTimeout(lidCloseTimer);
      clearTimeout(popTimer);
      clearTimeout(finishPopTimer);
      clearTimeout(dumplingPopTimer);
      clearTimeout(finishDumplingPopTimer);
      elements.dumpling.style.animation = "none";
      dumplingAnimating = false;
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEYS.states);
      localStorage.removeItem(STORAGE_KEYS.statsDate);
      localStorage.removeItem(STORAGE_KEYS.stats);
      cardStates = {};
      todayStats = defaultStats();
      localStorage.setItem(STORAGE_KEYS.statsDate, todayKey());
      saveJson(STORAGE_KEYS.stats, todayStats);
      currentCard = null;
      queue = buildSessionQueue();
      elements.loadStatus.textContent = `${cards.length} cards`;
      renderUnknownList();
      showNextCard();
    }

    function getState(card) {
      return cardStates[card.id] || null;
    }

    function isDue(card) {
      const state = getState(card);
      return state && state.dueDate && state.dueDate <= todayKey();
    }

    function buildSessionQueue() {
      const isNotCurrent = (card) => !currentCard || card.id !== currentCard.id;
      const dueCards = cards.filter((card) => isNotCurrent(card) && isDue(card));
      const newLimitRemaining = Math.max(0, dailyTarget - todayStats.newIntroduced);
      const newCards = cards.filter((card) => isNotCurrent(card) && !getState(card)).slice(0, newLimitRemaining);
      return [...dueCards, ...newCards];
    }

    function updateProgress() {
      const remaining = queue.length + (currentCard ? 1 : 0);
      elements.sessionProgress.textContent = `${todayStats.reviewed} reviewed · ${remaining} queued`;
      elements.dailyProgress.textContent = `${todayStats.newIntroduced} / ${dailyTarget} new words`;
    }

    function unknownCards() {
      return cards.filter((card) => {
        const state = getState(card);
        return state && state.wrongCount > 0;
      });
    }

    function renderUnknownList() {
      const unknown = unknownCards();
      elements.unknownCount.textContent = `${unknown.length} ${unknown.length === 1 ? "word" : "words"}`;

      if (!unknown.length) {
        elements.unknownList.innerHTML = '<li class="unknown-empty">No unknown words yet.</li>';
        return;
      }

      elements.unknownList.innerHTML = unknown.map((card) => `
        <li class="unknown-item">
          <div class="unknown-german">${escapeHtml(card.german)}</div>
          <div class="unknown-czech">${escapeHtml(card.czech)}</div>
        </li>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setUnknownPanelOpen(open) {
      elements.unknownPanel.classList.toggle("open", open);
      elements.unknownPanelToggle.setAttribute("aria-expanded", String(open));
      if (open) {
        renderUnknownList();
      }
    }

    function setSettingsPanelOpen(open) {
      elements.scene.classList.toggle("settings-open", open);
      elements.settingsPanelToggle.setAttribute("aria-expanded", String(open));
    }

    function koiBounds() {
      const width = elements.koi?.getBoundingClientRect().width || 132;
      const height = elements.koi?.getBoundingClientRect().height || 66;
      return {
        maxX: Math.max(0, window.innerWidth - width),
        maxY: Math.max(0, window.innerHeight - height),
        width,
        height
      };
    }

    function renderKoi() {
      elements.koi.style.transform = `translate3d(${koiMotion.x}px, ${koiMotion.y}px, 0) scaleX(${koiMotion.facing})`;
    }

    function chooseKoiTarget() {
      const bounds = koiBounds();
      koiMotion.targetX = randomBetween(0, bounds.maxX);
      koiMotion.targetY = randomBetween(0, bounds.maxY);
      koiMotion.speed = randomBetween(KOI_MIN_SPEED, KOI_MAX_SPEED);
    }

    function positionKoiBubble() {
      const bubbleWidth = elements.koiBubble.offsetWidth || 430;
      const bubbleHeight = elements.koiBubble.offsetHeight || 96;
      const bounds = koiBounds();
      const preferredX = koiMotion.facing === 1
        ? koiMotion.x + bounds.width * 0.12
        : koiMotion.x + bounds.width - bubbleWidth - bounds.width * 0.12;
      const preferredY = koiMotion.y - bubbleHeight - 24;
      const x = clamp(preferredX, 16, window.innerWidth - bubbleWidth - 16);
      const y = clamp(preferredY, 16, window.innerHeight - bubbleHeight - 16);
      elements.koiBubble.style.transform = `translate3d(${x}px, ${y}px, 0) scale(0.96)`;
    }

    function randomKoiMessage() {
      return KOI_MESSAGES[Math.floor(Math.random() * KOI_MESSAGES.length)];
    }

    function scheduleKoiBubble() {
      clearTimeout(koiMotion.bubbleTimer);
      const delay = KOI_BUBBLE_INTERVAL + randomBetween(-KOI_BUBBLE_JITTER, KOI_BUBBLE_JITTER);
      koiMotion.bubbleTimer = window.setTimeout(showKoiBubble, Math.max(KOI_BUBBLE_VISIBLE_MS, delay));
    }

    function showKoiBubble() {
      if (!elements.koi || !elements.koiBubble) return;
      koiMotion.paused = true;
      clearTimeout(koiMotion.fadeTimer);
      clearTimeout(koiMotion.hideTimer);

      elements.koiBubble.textContent = randomKoiMessage();
      elements.koiBubble.className = "koi-bubble";
      positionKoiBubble();

      requestAnimationFrame(() => {
        elements.koiBubble.classList.add("visible");
        elements.koiBubble.style.transform = elements.koiBubble.style.transform.replace("scale(0.96)", "scale(1)");
      });

      koiMotion.fadeTimer = window.setTimeout(() => {
        elements.koiBubble.classList.add("fading");
      }, KOI_BUBBLE_VISIBLE_MS);

      koiMotion.hideTimer = window.setTimeout(() => {
        elements.koiBubble.className = "koi-bubble";
        elements.koiBubble.textContent = "";
        koiMotion.paused = false;
        koiMotion.lastFrame = null;
        chooseKoiTarget();
        scheduleKoiBubble();
      }, KOI_BUBBLE_VISIBLE_MS + KOI_BUBBLE_FADE_MS);
    }

    function moveKoi(timestamp) {
      if (!elements.koi) return;

      if (koiMotion.lastFrame === null) {
        koiMotion.lastFrame = timestamp;
      }

      const elapsedSeconds = Math.min(0.08, (timestamp - koiMotion.lastFrame) / 1000);
      koiMotion.lastFrame = timestamp;

      if (!koiMotion.paused) {
        const dx = koiMotion.targetX - koiMotion.x;
        const dy = koiMotion.targetY - koiMotion.y;
        const distance = Math.hypot(dx, dy);

        if (distance < 2) {
          chooseKoiTarget();
        } else {
          const step = Math.min(distance, koiMotion.speed * elapsedSeconds);
          koiMotion.x += (dx / distance) * step;
          koiMotion.y += (dy / distance) * step;
          koiMotion.facing = dx > 0 ? -1 : 1;
        }

        const bounds = koiBounds();
        koiMotion.x = clamp(koiMotion.x, 0, bounds.maxX);
        koiMotion.y = clamp(koiMotion.y, 0, bounds.maxY);
        renderKoi();
      }

      koiMotion.animationFrame = requestAnimationFrame(moveKoi);
    }

    function initKoi() {
      if (!elements.koi || !elements.koiBubble) return;
      const bounds = koiBounds();
      koiMotion.x = randomBetween(0, bounds.maxX);
      koiMotion.y = randomBetween(0, bounds.maxY);
      chooseKoiTarget();
      renderKoi();
      scheduleKoiBubble();
      koiMotion.animationFrame = requestAnimationFrame(moveKoi);
    }

    function handleKoiResize() {
      if (!elements.koi) return;
      const bounds = koiBounds();
      koiMotion.x = clamp(koiMotion.x, 0, bounds.maxX);
      koiMotion.y = clamp(koiMotion.y, 0, bounds.maxY);
      koiMotion.targetX = clamp(koiMotion.targetX, 0, bounds.maxX);
      koiMotion.targetY = clamp(koiMotion.targetY, 0, bounds.maxY);
      renderKoi();
      if (koiMotion.paused) {
        positionKoiBubble();
      }
    }

    function initialFontSize(text, maxPx, longTextAt, minPx) {
      const cleanLength = text.trim().length;
      if (cleanLength <= 18) return maxPx;
      const ratio = Math.min(1, Math.max(0, (cleanLength - 18) / (longTextAt - 18)));
      return Math.round(maxPx - (maxPx - minPx) * ratio);
    }

    function fitTextToContainer(element, options) {
      const { text, maxPx, minPx, longTextAt } = options;
      element.style.fontSize = `${initialFontSize(text, maxPx, longTextAt, minPx)}px`;

      requestAnimationFrame(() => {
        let size = Number.parseFloat(element.style.fontSize);
        while (
          size > minPx &&
          (element.scrollWidth > element.clientWidth || element.scrollHeight > element.clientHeight)
        ) {
          size -= 1;
          element.style.fontSize = `${size}px`;
        }
      });
    }

    function renderCard(card) {
      currentCard = card;
      answerVisible = false;
      elements.germanText.textContent = card.german;
      fitTextToContainer(elements.germanText, {
        text: card.german,
        maxPx: 32,
        minPx: 18,
        longTextAt: 50
      });
      elements.answerText.textContent = "";
      elements.dumpling.classList.add("hidden");
      elements.dumpling.classList.remove("prepare-pop", "pop-from-steamer");
      elements.answerText.classList.add("hidden");
      elements.toggleAnswer.textContent = "Pop answer";
      elements.completeView.style.display = "none";
      elements.cardStage.style.display = "grid";
      updateProgress();
    }

    function showCard(card, animatePop = true) {
      clearSteamerTimers();
      renderCard(card);

      if (!animatePop) {
        elements.flashcard.className = "flashcard enter";
        return;
      }

      elements.scene.classList.remove("lid-open");
      elements.flashcard.className = "flashcard prepare-pop";

      lidTimer = window.setTimeout(() => {
        elements.scene.classList.add("lid-open");
        popTimer = window.setTimeout(() => {
          elements.flashcard.className = "flashcard pop-from-steamer";
          finishPopTimer = window.setTimeout(() => {
            elements.flashcard.className = "flashcard";
            lidCloseTimer = window.setTimeout(() => {
              elements.scene.classList.remove("lid-open");
            }, LID_CLOSE_AFTER_POP_DELAY);
          }, POP_DURATION);
        }, POP_AFTER_LID_DELAY);
      }, LID_OPEN_DELAY);
    }

    function showComplete() {
      currentCard = null;
      elements.cardStage.style.display = "none";
      elements.completeView.style.display = "block";
      elements.completeReviewed.textContent = `Reviewed today: ${todayStats.reviewed}`;
      elements.completeBreakdown.textContent = `Known: ${todayStats.known} · Unsure: ${todayStats.unsure} · Unknown: ${todayStats.unknown}`;
      updateProgress();
    }

    function showNextCard() {
      const nextCard = queue.shift();
      if (nextCard) {
        showCard(nextCard);
      } else {
        showComplete();
      }
    }

    function toggleAnswerWithSteamer() {
      if (!currentCard || animating || dumplingAnimating) return;
      clearTimeout(lidTimer);
      clearTimeout(lidCloseTimer);
      clearTimeout(dumplingPopTimer);
      clearTimeout(finishDumplingPopTimer);

      dumplingAnimating = true;
      elements.scene.classList.remove("lid-open");

      lidTimer = window.setTimeout(() => {
        elements.scene.classList.add("lid-open");
      dumplingPopTimer = window.setTimeout(() => {
          elements.dumpling.style.animation = "none";

          if (answerVisible) {
            elements.dumpling.className = "dumpling";
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                elements.dumpling.style.animation = "";
                elements.dumpling.className = "dumpling return-to-steamer";
              });
            });
          } else {
            elements.answerText.textContent = currentCard.czech;
            elements.answerText.classList.remove("hidden");
            fitTextToContainer(elements.answerText, {
              text: currentCard.czech,
              maxPx: 22,
              minPx: 13,
              longTextAt: 55
            });
            elements.dumpling.className = "dumpling prepare-pop";
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                elements.dumpling.style.animation = "";
                elements.dumpling.className = "dumpling pop-from-steamer";
              });
            });
          }

          const duration = answerVisible ? DUMPLING_RETURN_DURATION : DUMPLING_POP_DURATION;
          finishDumplingPopTimer = window.setTimeout(() => {
            if (answerVisible) {
              answerVisible = false;
              elements.answerText.textContent = "";
              elements.answerText.classList.add("hidden");
              elements.dumpling.style.animation = "";
              elements.dumpling.className = "dumpling hidden";
            } else {
              answerVisible = true;
              elements.dumpling.style.animation = "";
              elements.dumpling.className = "dumpling";
            }

            dumplingAnimating = false;
            lidCloseTimer = window.setTimeout(() => {
              elements.scene.classList.remove("lid-open");
            }, LID_CLOSE_AFTER_POP_DELAY);
          }, duration);
        }, DUMPLING_POP_AFTER_LID_DELAY);
      }, LID_OPEN_DELAY);
    }

    function nextKnownInterval(reviewCount, previousInterval) {
      const steps = [1, 3, 7, 14];
      if (reviewCount <= steps.length) {
        return steps[reviewCount - 1];
      }
      return Math.max(1, Math.round(previousInterval * 2));
    }

    function updateReviewState(card, result) {
      const existing = getState(card);
      const now = new Date();
      const state = {
        status: existing?.status || "learning",
        ease: existing?.ease || DEFAULT_EASE,
        intervalDays: existing?.intervalDays || 0,
        dueDate: existing?.dueDate || todayKey(),
        reviewCount: existing?.reviewCount || 0,
        wrongCount: existing?.wrongCount || 0,
        lastReviewed: now.toISOString()
      };

      const wasNew = !existing;
      state.reviewCount += 1;

      // MVP spaced repetition rules:
      // known increases the interval, unsure keeps the card close, and unknown
      // lowers ease while sending the card back into this session soon.
      if (result === "known") {
        state.status = "review";
        state.ease = Number((state.ease + 0.05).toFixed(2));
        state.intervalDays = nextKnownInterval(state.reviewCount, state.intervalDays);
        state.dueDate = dateOnly(addDays(now, state.intervalDays));
      }

      if (result === "unsure") {
        state.status = "learning";
        state.ease = Math.max(MIN_EASE, Number((state.ease - 0.05).toFixed(2)));
        state.intervalDays = 1;
        state.dueDate = dateOnly(addDays(now, 1));
        insertSoon(card, 2);
      }

      if (result === "unknown") {
        state.status = "learning";
        state.ease = Math.max(MIN_EASE, Number((state.ease - 0.2).toFixed(2)));
        state.intervalDays = 0;
        state.dueDate = todayKey();
        state.wrongCount += 1;
        insertSoon(card, 1);
      }

      if (wasNew) {
        todayStats.newIntroduced += 1;
      }

      todayStats.reviewed += 1;
      todayStats[result] += 1;
      cardStates[card.id] = state;
      saveState();
      renderUnknownList();
    }

    function insertSoon(card, offset) {
      const withoutCurrentCard = queue.filter((queuedCard) => queuedCard.id !== card.id);
      queue = withoutCurrentCard;
      queue.splice(Math.min(offset, queue.length), 0, card);
    }

    function answer(result, exitClass) {
      if (!currentCard || animating) return;
      animating = true;
      const reviewedCard = currentCard;

      clearSteamerTimers();
      updateReviewState(reviewedCard, result);
      updateProgress();
      elements.flashcard.className = `flashcard ${exitClass}`;

      window.setTimeout(() => {
        elements.dumpling.className = "dumpling hidden";
        elements.answerText.classList.add("hidden");
        animating = false;
        showNextCard();
      }, EXIT_DURATION);
    }

    function playPronunciation() {
      if (!currentCard) return;
      const audio = new Audio(currentCard.audio);
      audio.play().catch((error) => {
        elements.loadStatus.textContent = "Audio unavailable";
        console.warn("Audio playback failed", error);
      });
    }

    function bindEvents() {
      elements.toggleAnswer.addEventListener("click", toggleAnswerWithSteamer);
      elements.flashcard.addEventListener("click", toggleAnswerWithSteamer);
      elements.knownButton.addEventListener("click", () => answer("known", "exit-left"));
      elements.unsureButton.addEventListener("click", () => answer("unsure", "exit-up"));
      elements.unknownButton.addEventListener("click", () => answer("unknown", "exit-right"));
      elements.audioButton.addEventListener("click", playPronunciation);
      elements.unknownPanelToggle.addEventListener("click", () => {
        setUnknownPanelOpen(!elements.unknownPanel.classList.contains("open"));
      });
      elements.unknownPanelClose.addEventListener("click", () => setUnknownPanelOpen(false));
      elements.settingsPanelToggle.addEventListener("click", () => {
        setSettingsPanelOpen(!elements.scene.classList.contains("settings-open"));
      });
      window.addEventListener("resize", handleKoiResize);
      elements.dailyTargetInput.addEventListener("change", (event) => {
        saveDailyTarget(event.target.value);
        queue = buildSessionQueue();
        if (!currentCard) {
          showNextCard();
        } else {
          updateProgress();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.target === elements.dailyTargetInput) return;

        if (event.code === "Space") {
          event.preventDefault();
          toggleAnswerWithSteamer();
        }
        if (event.code === "ArrowLeft") {
          event.preventDefault();
          answer("known", "exit-left");
        }
        if (event.code === "ArrowUp") {
          event.preventDefault();
          answer("unsure", "exit-up");
        }
        if (event.code === "ArrowRight") {
          event.preventDefault();
          answer("unknown", "exit-right");
        }
        if (event.code === "ArrowDown") {
          event.preventDefault();
          playPronunciation();
        }
        if (event.code === "Escape") {
          setUnknownPanelOpen(false);
          setSettingsPanelOpen(false);
        }
      });
    }

    async function init() {
      dailyTarget = loadDailyTarget();
      elements.dailyTargetInput.value = dailyTarget;
      elements.targetNote.textContent = `Current target: ${dailyTarget}`;
      cardStates = loadJson(STORAGE_KEYS.states, {});
      todayStats = loadStatsForToday();
      bindEvents();
      initKoi();
      renderUnknownList();

      try {
        const response = await fetch("cards.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        cards = await response.json();
        queue = buildSessionQueue();
        elements.loadStatus.textContent = `${cards.length} cards`;
        renderUnknownList();
        showNextCard();
      } catch (error) {
        elements.loadStatus.textContent = "Load failed";
        elements.germanText.textContent = "Could not load cards.json";
        elements.answerText.textContent = "Start a local server and try again.";
        elements.dumpling.classList.remove("hidden");
        elements.answerText.classList.remove("hidden");
        elements.toggleAnswer.disabled = true;
        document.querySelectorAll(".action-button").forEach((button) => {
          button.style.display = "none";
        });
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
